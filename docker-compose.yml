services:
  # ── Base de datos ──
  db:
    image: postgres:16-alpine
    container_name: mn_postgres
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - apps/backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Backend NestJS ──
  # Expone el puerto 3002 al host para que el nginx del sistema
  # (que sirve múltiples sitios) le haga proxy reverso.
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: mn_backend
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - apps/backend/.env
    depends_on:
      - db

volumes:
  postgres_data:
