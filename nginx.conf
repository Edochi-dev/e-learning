# ──────────────────────────────────────────────────────────
# Nginx – reverse proxy de producción para marisnails.academy
# ──────────────────────────────────────────────────────────

# ── 1. HTTP → HTTPS (redirección permanente) ─────────────
# Todo el tráfico que llegue por HTTP se manda a HTTPS.
# El 301 le dice al navegador: "guarda esto, siempre usa HTTPS".
server {
    listen 80;
    server_name marisnails.academy www.marisnails.academy;

    return 301 https://marisnails.academy$request_uri;
}

# ── 2. www → sin www (un solo dominio canónico) ──────────
# Google penaliza contenido duplicado. Si alguien entra por
# www.marisnails.academy, lo mandamos al dominio principal.
server {
    listen 443 ssl;
    server_name www.marisnails.academy;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 301 https://marisnails.academy$request_uri;
}

# ── 3. Bloque principal HTTPS ────────────────────────────
server {
    listen 443 ssl;
    server_name marisnails.academy;

    # ── Certificados SSL ──
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── Protocolo SSL endurecido ──
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # ── Cabeceras de seguridad ──
    # HSTS: el navegador recuerda por 1 año que SOLO debe usar HTTPS.
    # Esto previene ataques man-in-the-middle en la primera conexión.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Previene que tu sitio sea cargado dentro de un <iframe> ajeno (clickjacking).
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Le dice al navegador: "confía en el Content-Type que yo te mando,
    # no intentes adivinar". Previene ataques de MIME sniffing.
    add_header X-Content-Type-Options "nosniff" always;

    # Controla cuánta info del Referer se manda a otros sitios.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compresión Gzip ──
    # Sin esto, un bundle de React de 300KB viaja completo.
    # Con gzip, baja a ~80KB. La diferencia es enorme en móviles.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Límite de subida ──
    # Por defecto Nginx rechaza bodies mayores a 1MB.
    # Necesitamos más para thumbnails, imágenes y videos.
    client_max_body_size 100M;

    # ── Frontend: archivos estáticos de React ──
    root /usr/share/nginx/html;
    index index.html;

    # Archivos con hash en el nombre (ej: index-D4f8k2.js)
    # nunca cambian → cache agresivo de 1 año.
    location ~* \.(js|mjs|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Esto resuelve el problema de .mjs: forzamos el Content-Type correcto.
        # Lo hacemos dentro del mismo bloque de cache para no duplicar locations.
        types {
            application/javascript js mjs;
            text/css               css;
            image/svg+xml          svg;
            image/png              png;
            image/jpeg             jpg jpeg;
            image/webp             webp;
            image/gif              gif;
            image/x-icon           ico;
            font/woff              woff;
            font/woff2             woff2;
            font/ttf               ttf;
            application/vnd.ms-fontobject eot;
        }

        try_files $uri =404;
    }

    # index.html NUNCA debe cachearse.
    # Si se cachea, el usuario no vería nuevas versiones del frontend.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: cualquier ruta que no sea un archivo → index.html
    # Así React Router maneja /catalogo, /login, /admin, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend: proxy reverso hacia NestJS ──
    # El frontend llama a https://marisnails.academy/api/courses
    # Nginx recibe /api/courses, le quita /api/ y manda /courses al backend.
    location /api/ {
        proxy_pass http://backend:3000/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para operaciones lentas
        # (ej: generar certificados PDF en lote)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Streaming de video ──
    # Bloque separado porque los videos necesitan configuración especial:
    # sin buffering (el video empieza a reproducirse mientras se descarga).
    location /api/videos/ {
        proxy_pass http://backend:3000/videos/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sin buffering: Nginx reenvía los bytes al usuario inmediatamente
        # en vez de esperar a que el backend termine de enviar todo el video.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ── Archivos estáticos del backend ──
    # Imágenes, thumbnails y certificados PDF se sirven desde NestJS
    # en /static/... El frontend los pide como /api/static/...
    location /api/static/ {
        proxy_pass http://backend:3000/static/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache del navegador para imágenes servidas por el backend
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400";
    }
}
